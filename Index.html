<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybervast AccessThriveEx Quiz_App</title>
    <link rel="stylesheet" href="style.css">
     <!-- CyberVast Brand Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- cybervast Header -->
    <header class="cybervast-header">
        <div class="logo-container">
            <div class="logo-icon">CV</div>
            <div class="logo-text">
                <span class="company-name">Cybervast</span>
                <span class="tagline">Limited</span>
            </div>
        </div>
        <div class="program-badge">
            <span class="badge-text">YourThrive Program</span>
        </div>
    </header>

    <!-- main Quiz container -->
     <main class="quiz-container">
        <!-- Quiz Header -->
         <div class="quiz-header">
            <h1 class="quiz-title">AccessThriveEx Quiz</h1>
            <p class="quiz-subtitle">Powered by Popoola-Taye * Student of * Cybervast Limited</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="question-counter" id="questionCounter">Question 1 of 5</div>
         </div>
         <!-- Question Display -->
          <div class="question-container" id="questionContainer">
            <h2 class="question-text" id="questionText">Loading question....</h2>
          </div>

          <!-- Answer Option -->
           <div class="answer-container" id="answerContainer">
            <!-- Button will be generated by Javascript -->
           </div>

           <!-- navigation -->
            <div class="navigation">
                <button class="next-btn hidden" id="nextBtn">
                    Next Question <span class="arrow">→</span>
                </button>
            </div>
     </main>    
     
     <!-- Noscript fallback -->
    <noscript>
        <div style="text-align: center; padding: 2rem; color: white;">
            <p>JavaScript is required to take this quiz. Please enable JavaScript in your browser.</p>
        </div>
    </noscript>

    <!-- ADDED: JavaScript file reference with type attribute -->
    <script src="script.js" type="text/javascript"></script>
</body>
</html>
